name: Refresh Middle East tracker

# Keeps middle-east/index.html (+ meta.json + the root "Last updated" string) in sync
# with the JSON source of record in middle-east/data/.
#
# Every run first collects any new months (collect_incremental.py, via the Claude API +
# web search) and then rebuilds from the JSON source of record in middle-east/data/.
#
# Triggers:
#   • push to main touching middle-east/data/**  → collect + full rebuild, commit result back
#   • manual "Run workflow"                       → collect + full rebuild or --date-only (your choice)
#   • weekly cron                                 → collect new months, then FULL rebuild
#
# NOTE: the weekly cron does a FULL rebuild (not --date-only) so any month collect_incremental.py
# adds actually reaches index.html — a full rebuild also stamps meta.json's last_updated to the
# run date. collect_incremental.py needs the ANTHROPIC_API_KEY repo secret; with no new months it
# is a no-op and the secret is unused.

on:
  push:
    branches: [main]
    paths:
      - "middle-east/data/**"
  workflow_dispatch:
    inputs:
      date:
        description: "Date to stamp (YYYY-MM-DD). Blank = today (UTC)."
        required: false
        type: string
      mode:
        description: "Build mode"
        required: false
        default: "full"
        type: choice
        options: ["full", "date-only"]
  schedule:
    # Mondays 08:00 UTC — weekly timestamp bump (see NOTE above)
    - cron: "0 8 * * 1"

permissions:
  contents: write

concurrency:
  group: refresh-tracker
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Anthropic SDK
        run: pip install anthropic

      - name: Collect new months (Claude API + web search)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 middle-east/scripts/collect_incremental.py

      - name: Rebuild from data/*.json
        env:
          EVENT_NAME: ${{ github.event_name }}
          IN_DATE: ${{ inputs.date }}
          IN_MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          ARGS=""
          case "$EVENT_NAME" in
            schedule)
              ARGS="" ;;   # full rebuild — incorporates any newly collected months and bumps the date
            workflow_dispatch)
              [ "$IN_MODE" = "date-only" ] && ARGS="--date-only"
              [ -n "$IN_DATE" ] && ARGS="$ARGS --date $IN_DATE" ;;
            *)
              ARGS="" ;;   # push to data/** → full rebuild, date = today
          esac
          echo "Running: build_dataset.py $ARGS"
          python3 middle-east/scripts/build_dataset.py $ARGS

      - name: Commit & push if changed
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore(data): rebuild tracker artifact ($(date -u +%F)) [skip ci]"
            git push
            echo "Pushed regenerated artifact."
          else
            echo "No changes — artifact already in sync."
          fi
